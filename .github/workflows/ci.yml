name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Ruff (format check)
        run: ruff format --check .
      - name: Mypy (type check)
        run: mypy src/
      - name: Import Linter (의존 규칙)
        run: lint-imports

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pytest
        run: pytest -v --cov=src --cov-report=xml
      - name: Upload coverage (Linux only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml

  dco-check:
    name: DCO Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO
        run: |
          # 모든 commit에 Signed-off-by가 있는지 확인
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          missing=$(git log --no-merges "$base_sha".."$head_sha" --pretty=format:"%H %s" \
            | while read sha rest; do
                if ! git log -1 --pretty=format:"%B" "$sha" | grep -q "^Signed-off-by:"; then
                  echo "$sha"
                fi
              done)
          if [ -n "$missing" ]; then
            echo "::error::다음 commit에 Signed-off-by가 없습니다:"
            echo "$missing"
            echo ""
            echo "수정: git commit --amend --signoff (마지막 commit) 또는"
            echo "      git rebase --signoff $base_sha (전체)"
            exit 1
          fi
